# Oracle Always Free 인스턴스 배포용 스택 (CI 빌드 → GHCR pull 방식).
#
# 이미지는 GitHub Actions에서 빌드해 GHCR(ghcr.io)에 push하고, 서버는 pull만 한다.
#   → 작은 인스턴스에서 docker build를 하지 않으므로 apt/pip 다운로드 부하·실패가 없다.
#
# DB는 이 스택에 없다 — cocktail-mate-db의 docker-compose.db.yml이 별도 구동.
# api는 host.docker.internal:5432로 접속. 외부 트래픽은 Caddy(80/443)가 받는다.
#
# 이미지 태그는 배포 워크플로가 API_IMAGE/CADDY_IMAGE 환경변수로 주입한다
# (미지정 시 :latest). 실행(서버):
#   docker login ghcr.io && docker compose -f docker-compose.prod.yml pull && ... up -d
services:

  caddy:
    image: ${CADDY_IMAGE:-ghcr.io/makerspacesiwoo/cocktail-mate-caddy:latest}
    container_name: caddy
    restart: always
    ports:
      - "80:80"          # ACME(HTTP-01) 챌린지 + HTTP→HTTPS 리다이렉트
      - "443:443"        # HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/etc/caddy/certs:ro   # Cloudflare Origin CA 인증서(gitignore된 *.pem, 서버에만 존재)
      - caddy_data:/data       # 발급된 인증서 영속화
      - caddy_config:/config
    depends_on:
      - api

  api:
    image: ${API_IMAGE:-ghcr.io/makerspacesiwoo/cocktail-mate-server:latest}
    container_name: fastapi-server
    restart: always
    expose:
      - "8000"           # 내부 네트워크에서만 (외부는 Caddy 경유)
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"   # 같은 인스턴스의 DB(5432)로 접속

volumes:
  caddy_data:
  caddy_config:
