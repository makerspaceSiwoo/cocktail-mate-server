name: Deploy api-server to OCI

# main push마다: ① GitHub Actions에서 api/caddy 이미지를 빌드해 GHCR에 push
#               ② OCI 서버는 pull + up 만 (서버에서 빌드 X → 인스턴스 과부하/네트워크 문제 회피)
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: oci-deploy
  cancel-in-progress: false

env:
  API_IMAGE: ghcr.io/makerspacesiwoo/cocktail-mate-server
  CADDY_IMAGE: ghcr.io/makerspacesiwoo/cocktail-mate-caddy

jobs:
  # ── ① 빌드 & GHCR push ──
  # OCI가 ARM이라 arm64 이미지 필요 → 네이티브 ARM 러너에서 빌드(에뮬레이션 X, 빠름).
  # ubuntu-24.04-arm 은 public 레포 무료 제공.
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # private 패키지(cocktail-mate-db) 설치용 Deploy Key를 ssh-agent에 로드
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CMDB_DEPLOY_KEY }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api 이미지
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64   # OCI 인스턴스가 ARM
          ssh: default          # cocktail-mate-db(private) 설치
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build & push caddy 이미지
        uses: docker/build-push-action@v6
        with:
          context: ./caddy
          platforms: linux/arm64   # OCI 인스턴스가 ARM
          push: true
          tags: |
            ${{ env.CADDY_IMAGE }}:latest
            ${{ env.CADDY_IMAGE }}:${{ github.sha }}

  # ── ② OCI 서버에 SSH → pull + up (헬스 실패 시 직전 이미지로 롤백) ──
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: SSH 배포 (pull + up)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN,API_IMAGE,CADDY_IMAGE,SHA
          command_timeout: 10m
          script: |
            set -e
            cd ~/cocktail-mate-server
            git fetch origin && git checkout main && git reset --hard origin/main   # compose/Caddyfile만 최신화 (.env 보존)
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin
            PREV_API=$(sudo docker inspect --format '{{.Config.Image}}' fastapi-server 2>/dev/null || echo "")
            API_TAG="${API_IMAGE}:${SHA}"; CADDY_TAG="${CADDY_IMAGE}:${SHA}"
            sudo API_IMAGE="$API_TAG" CADDY_IMAGE="$CADDY_TAG" docker compose -f docker-compose.prod.yml pull
            sudo API_IMAGE="$API_TAG" CADDY_IMAGE="$CADDY_TAG" docker compose -f docker-compose.prod.yml up -d
            sleep 8
            if curl -fsS http://localhost:8000/health; then
              echo "✅ 배포 성공"
            else
              echo "❌ 헬스 실패 → 직전 이미지로 롤백: ${PREV_API:-(없음)}"
              if [ -n "$PREV_API" ]; then
                sudo API_IMAGE="$PREV_API" CADDY_IMAGE="$CADDY_TAG" docker compose -f docker-compose.prod.yml up -d
              fi
              exit 1
            fi
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_IMAGE: ${{ env.API_IMAGE }}
          CADDY_IMAGE: ${{ env.CADDY_IMAGE }}
          SHA: ${{ github.sha }}
