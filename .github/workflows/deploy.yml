name: Deploy api-server (main→OCI | develop→Render)

# CI must pass before merge to main — enforced by branch protection required
# status checks (see runbook), so any commit on main already passed CI.
#
# main push마다:   ① GitHub Actions에서 api/caddy 이미지를 빌드해 GHCR에 push (arm64, OCI)
#                  ② OCI 서버는 pull + migrate + up 만 (서버에서 빌드 X → 인스턴스 과부하/네트워크 문제 회피)
# develop push마다: ① amd64 api 이미지를 빌드해 GHCR에 push
#                   ② develop DB migrate → Render 환경변수 동기화 → deploy hook → health check
on:
  push:
    branches: [main, develop]
  workflow_dispatch: {}

concurrency:
  group: oci-deploy
  cancel-in-progress: false

env:
  API_IMAGE: ghcr.io/makerspacesiwoo/cocktail-mate-server
  CADDY_IMAGE: ghcr.io/makerspacesiwoo/cocktail-mate-caddy

jobs:
  # ── ① [main] 빌드 & GHCR push (arm64 / OCI) ──
  # OCI가 ARM이라 arm64 이미지 필요 → 네이티브 ARM 러너에서 빌드(에뮬레이션 X, 빠름).
  # ubuntu-24.04-arm 은 public 레포 무료 제공.
  # db 패키지는 로컬 monorepo(packages/db_schema) → ssh/Deploy Key 불필요.
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api 이미지
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64   # OCI 인스턴스가 ARM
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build & push caddy 이미지
        uses: docker/build-push-action@v6
        with:
          context: ./caddy
          platforms: linux/arm64   # OCI 인스턴스가 ARM
          push: true
          tags: |
            ${{ env.CADDY_IMAGE }}:latest
            ${{ env.CADDY_IMAGE }}:${{ github.sha }}

  # ── ② [main] OCI 서버에 SSH → .env 업로드 → migrate → pull + up (헬스 실패 시 직전 이미지로 롤백) ──
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: SSH 배포 (.env upload → alembic migrate → compose up)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN,API_IMAGE,CADDY_IMAGE,SHA,APP_ENV_FILE,MIGRATION_ENV_FILE
          command_timeout: 10m
          script: |
            set -e
            cd ~/cocktail-mate-server

            # 1. compose/Caddyfile 최신화 (.env は保존)
            git fetch origin && git checkout main && git reset --hard origin/main

            # 2. 런타임 .env 업로드 (cm_app, DDL 권한 없음 — API 컨테이너가 읽는 파일)
            printf '%s' "$APP_ENV_FILE" > .env && chmod 600 .env

            # 3. GHCR 로그인
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # 4. 이미지 pull
            PREV_API=$(sudo docker inspect --format '{{.Config.Image}}' fastapi-server 2>/dev/null || echo "")
            API_TAG="${API_IMAGE}:${SHA}"; CADDY_TAG="${CADDY_IMAGE}:${SHA}"
            sudo API_IMAGE="$API_TAG" CADDY_IMAGE="$CADDY_TAG" docker compose -f docker-compose.prod.yml pull

            # 5. 마이그레이션 전용 env 파일 (cm_admin, ALEMBIC_DATABASE_URL 포함 — API 컨테이너에는 절대 노출 X)
            trap 'rm -f /tmp/cm_migration.env' EXIT
            printf '%s' "$MIGRATION_ENV_FILE" > /tmp/cm_migration.env && chmod 600 /tmp/cm_migration.env

            # 6. Alembic 마이그레이션 (one-off 컨테이너) — 실패 시 set -e 가 즉시 중단해 API up 이 실행되지 않는다
            sudo docker run --rm --env-file /tmp/cm_migration.env \
              --add-host=host.docker.internal:host-gateway \
              "$API_TAG" sh -c 'cd packages/db_schema && alembic upgrade head'
            rm -f /tmp/cm_migration.env

            # 7. API + Caddy 기동
            sudo API_IMAGE="$API_TAG" CADDY_IMAGE="$CADDY_TAG" docker compose -f docker-compose.prod.yml up -d

            # api는 expose(내부)만 — 호스트 localhost:8000은 안 열림 → 컨테이너 내부에서 확인.
            # 기동 시간 고려해 최대 ~30초 재시도.
            ok=0
            for i in 1 2 3 4 5 6; do
              if sudo docker exec fastapi-server python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)" 2>/dev/null; then
                ok=1; break
              fi
              sleep 5
            done
            if [ "$ok" = 1 ]; then
              echo "배포 성공 (api /health 200)"
            else
              echo "헬스 실패 -> 직전 이미지로 롤백: ${PREV_API:-(없음)}"
              if [ -n "$PREV_API" ]; then
                sudo API_IMAGE="$PREV_API" CADDY_IMAGE="$CADDY_TAG" docker compose -f docker-compose.prod.yml up -d
              fi
              echo "--- api 로그 (원인 확인용) ---"; sudo docker logs fastapi-server --tail 30 2>&1 || true
              exit 1
            fi
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_IMAGE: ${{ env.API_IMAGE }}
          CADDY_IMAGE: ${{ env.CADDY_IMAGE }}
          SHA: ${{ github.sha }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          MIGRATION_ENV_FILE: ${{ secrets.MIGRATION_ENV_FILE }}

  # ── ③ [develop] 빌드 & GHCR push (amd64 / Render) ──
  # Render는 amd64 → linux/amd64 이미지. CADDY 불필요(Render가 TLS 처리).
  # db 패키지는 로컬 monorepo → ssh/Deploy Key 불필요.
  build-develop:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api 이미지 (amd64 — Render)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.API_IMAGE }}:develop
            ${{ env.API_IMAGE }}:${{ github.sha }}

  # ── ④ [develop] develop DB migrate → Render 환경변수 동기화 → deploy hook → health ──
  # 순서: migrate BEFORE deploy (constraints.md "Deploy order (always)" 준수).
  # environment: develop — RENDER_* + APP_ENV_FILE + ALEMBIC_DATABASE_URL 시크릿 보유.
  deploy-develop:
    if: github.ref == 'refs/heads/develop'
    needs: build-develop
    runs-on: ubuntu-latest
    environment: develop
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip install db_schema[migrations]
        run: pip install -e ./packages/db_schema[migrations]

      # Step 1: develop DB 마이그레이션 — 실패 시 이후 단계 전체 중단 (set -e)
      - name: Alembic migrate (develop DB)
        working-directory: packages/db_schema
        env:
          ALEMBIC_DATABASE_URL: ${{ secrets.ALEMBIC_DATABASE_URL }}
        run: alembic upgrade head

      # Step 2: Render 환경변수 동기화 (runtime, cm_app)
      # - APP_ENV_FILE(dotenv) → JSON 배열([{key,value}]) 변환 후 Render API PUT
      # - 값은 절대 echo/print하지 않음; printf로 파일에만 씀; trap EXIT으로 정리 보장
      # - PUT /v1/services/{id}/env-vars: 확인된 Render 공식 docs (api-docs.render.com)
      - name: Sync Render env vars
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          APP_ENV="$RUNNER_TEMP/app.env"
          RENDER_JSON="$RUNNER_TEMP/render-env.json"
          trap 'rm -f "$APP_ENV" "$RENDER_JSON"' EXIT

          # 값 노출 없이 파일에만 기록 (printf는 shell expansion 없음)
          printf '%s' "$APP_ENV_FILE" > "$APP_ENV"
          chmod 600 "$APP_ENV"

          # dotenv(KEY=VALUE 또는 KEY="VALUE") → Render JSON array [{"key":...,"value":...}]
          # python이 파일을 읽어 변환 — 값을 터미널/로그에 출력하지 않음
          python3 - "$APP_ENV" "$RENDER_JSON" <<'PYEOF'
          import sys, json, re

          env_path, out_path = sys.argv[1], sys.argv[2]
          pairs = []
          with open(env_path) as f:
              for raw in f:
                  line = raw.strip()
                  if not line or line.startswith('#'):
                      continue
                  m = re.match(r'^([A-Za-z_][A-Za-z0-9_]*)=(.*)', line)
                  if not m:
                      continue
                  key = m.group(1)
                  val = m.group(2)
                  # strip surrounding quotes
                  if len(val) >= 2 and val[0] == val[-1] and val[0] in ('"', "'"):
                      val = val[1:-1]
                  pairs.append({"key": key, "value": val})
          with open(out_path, 'w') as f:
              json.dump(pairs, f)
          PYEOF
          chmod 600 "$RENDER_JSON"

          # Render API: PUT /v1/services/{serviceId}/env-vars
          # 확인 출처: https://api-docs.render.com/reference/update-env-vars-for-service.md
          # Authorization 헤더 값은 Actions 마스킹으로 로그에 노출되지 않음
          curl -fsS -X PUT \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            --data-binary "@${RENDER_JSON}" \
            -o /dev/null

      # Step 3: Render deploy hook — 특정 이미지 태그로 배포 (imgURL 파라미터)
      # imgURL 파라미터명 확인: https://render.com/docs/deploy-hooks
      # 훅 URL에 이미 ? 가 포함될 수 있으므로 & 로 연결; imgURL은 git SHA 태그 사용
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          API_IMAGE: ${{ env.API_IMAGE }}
        run: |
          set -euo pipefail
          # imgURL을 쿼리 파라미터로 추가 (훅 URL 형태에 따라 ? or & 자동 선택)
          if echo "$RENDER_DEPLOY_HOOK_URL" | grep -q '?'; then
            HOOK="${RENDER_DEPLOY_HOOK_URL}&imgURL=${API_IMAGE}:${{ github.sha }}"
          else
            HOOK="${RENDER_DEPLOY_HOOK_URL}?imgURL=${API_IMAGE}:${{ github.sha }}"
          fi
          curl -fsS "$HOOK" -o /dev/null

      # Step 4: Render 헬스 체크 — cold start 고려해 최대 3분 대기 (12 × 15s)
      - name: Health check (RENDER_HEALTH_URL)
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          set -euo pipefail
          ok=0
          for i in $(seq 1 12); do
            status=$(curl -fsS -o /dev/null -w "%{http_code}" "$RENDER_HEALTH_URL" || true)
            if [ "$status" = "200" ]; then
              echo "Health OK ($i/12)"
              ok=1
              break
            fi
            echo "Attempt $i/12: status=${status:-ERR}, retrying in 15s…"
            sleep 15
          done
          if [ "$ok" != "1" ]; then
            echo "Health check failed after 12 attempts (3 min). Deploy may have failed."
            exit 1
          fi
