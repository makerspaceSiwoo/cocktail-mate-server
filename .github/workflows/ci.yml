name: CI

on: [pull_request, push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check .
      - run: python -m compileall -q app packages/db_schema/src

  schema:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cm_admin
          POSTGRES_PASSWORD: devpass
          POSTGRES_DB: cocktail_mate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cm_admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ./packages/db_schema[migrations]
      - name: alembic upgrade + check
        working-directory: packages/db_schema
        env:
          ALEMBIC_DATABASE_URL: postgresql+psycopg2://cm_admin:devpass@localhost:5432/cocktail_mate
        run: |
          alembic upgrade head
          alembic check

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f Dockerfile -t cocktail-mate-server:ci .
