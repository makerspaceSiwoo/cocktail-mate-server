#cloud-config
# 부팅 시 1회 실행: Docker 설치 + 인스턴스 내부 방화벽(iptables) 80/443 개방.
# Oracle Ubuntu 이미지는 기본 iptables에 REJECT 규칙이 있어, Security List만 열면
# 외부 접속이 막힌다. INPUT 체인에 ACCEPT 규칙을 삽입하고 영속화한다.
package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - iptables-persistent

runcmd:
  # --- Docker Engine + compose plugin 설치 ---
  - curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
  - sh /tmp/get-docker.sh
  - usermod -aG docker ubuntu
  - systemctl enable --now docker

  # --- 방화벽: HTTP(80)/HTTPS(443) 인바운드 허용 후 영속화 ---
  - iptables -I INPUT 6 -m state --state NEW -p tcp --dport 80 -j ACCEPT
  - iptables -I INPUT 6 -m state --state NEW -p tcp --dport 443 -j ACCEPT
  - netfilter-persistent save

  - echo "cloud-init done" > /var/log/cocktail-mate-init.log
