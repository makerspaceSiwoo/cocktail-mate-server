# 로컬 개발용 스택: FastAPI 단독.
# DB는 OCI 원격 개발 DB에 직접 접속한다 — .env의 DATABASE_URL(공인 IP)만 있으면 끝.
# (DB 운영/스키마는 cocktail-mate-db private 레포 담당)
# 프로덕션(Oracle) 배포는 docker-compose.prod.yml 사용.
services:

  api:
    build:
      context: .
    container_name: fastapi-server
    # 개발 전용 핫리로드: 아래 볼륨 마운트(.:/app)로 호스트 코드 변경이 컨테이너에 즉시 반영되고,
    # uvicorn --reload 가 app/ 을 감시하다 .py 변경 시 서버를 자동 재기동한다.
    # (Dockerfile CMD 는 그대로 두어 prod 이미지에는 --reload 가 들어가지 않는다.)
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "app"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app            # 핫리로드(개발 편의)
    # env 파일은 Makefile(up/up-d)이 골라 ENV_FILE 로 주입한다:
    #   .env.local 있으면 그것만, 없으면 .env, 둘 다 없으면 make 가 에러.
    # 각 파일은 self-contained(모든 키 포함) — 병합이 아니라 택일이다.
    # (직접 `docker compose up` 시엔 기본값 .env 사용)
    env_file:
      - ${ENV_FILE:-.env}

  # 로컬 개발 중 외부에서 API를 호출해볼 수 있게 하는 ngrok 터널 (opt-in).
  #   1) .env 에 NGROK_AUTHTOKEN 설정 (https://dashboard.ngrok.com/get-started/your-authtoken)
  #   2) docker compose --profile tunnel up -d
  #   3) 공개 URL 확인: docker compose logs ngrok  → msg="started tunnel" ... url=https://xxxx.ngrok-free.app
  #   profiles 로 묶여 있어 평소 `up` 에는 안 뜨고 `--profile tunnel` 일 때만 기동된다.
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    profiles: ["tunnel"]
    command: ["http", "api:8000", "--log", "stdout"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    depends_on:
      - api
