# 로컬 개발용 스택: FastAPI + PostgreSQL(pgvector) + MinIO(S3 호환 스토리지)
# 프로덕션(Oracle) 배포는 docker-compose.prod.yml 사용.
services:

  api:
    build: .
    container_name: fastapi-server
    ports:
      - "8000:8000"
    volumes:
      - .:/app            # 핫리로드(개발 편의)
    env_file:
      - .env
    depends_on:
      - db
      - minio

  db:
    image: pgvector/pgvector:pg16
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d   # 최초 1회 pgvector 확장 생성

  # 로컬에서 Oracle Object Storage를 대체하는 S3 호환 스토리지
  minio:
    image: minio/minio
    container_name: minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 웹 콘솔
    volumes:
      - minio_data:/data

  # 버킷 자동 생성 + 공개 읽기 정책 부여 (1회성 실행 후 종료)
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 $${STORAGE_ACCESS_KEY} $${STORAGE_SECRET_KEY}) do echo 'waiting for minio...'; sleep 2; done;
      mc mb --ignore-existing local/$${STORAGE_BUCKET};
      mc anonymous set download local/$${STORAGE_BUCKET};
      echo 'bucket ready';
      "

volumes:
  postgres_data:
  minio_data:
